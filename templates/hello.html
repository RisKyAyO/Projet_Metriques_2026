<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <title>Atelier Métriques</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #eee;
      }
      .card {
        background: rgba(255,255,255,0.07);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 16px;
        padding: 48px 64px;
        text-align: center;
        max-width: 500px;
        width: 90%;
      }
      h1 {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: 4px;
        color: #e94560;
        margin-bottom: 10px;
      }
      h2 {
        font-size: 1rem;
        font-weight: 400;
        color: #a8b2c1;
        margin-bottom: 36px;
      }
      .nav { display: flex; flex-direction: column; gap: 10px; }
      .nav a {
        display: block;
        padding: 13px 20px;
        background: rgba(233,69,96,0.12);
        border: 1px solid rgba(233,69,96,0.35);
        border-radius: 8px;
        color: #e94560;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        letter-spacing: 1px;
        transition: all 0.2s;
      }
      .nav a:hover { background: rgba(233,69,96,0.3); transform: translateX(4px); }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>ATELIER MÉTRIQUES</h1>
      <h2>Nom Prénom : Yahia Mounim</h2>
      <div class="nav">
        <a href="/contact">📋 Contact</a>
        <a href="/paris">🌡️ API Météo Paris</a>
        <a href="/rapport">📈 Graphique Températures</a>
        <a href="/histogramme">📊 Histogramme</a>
        <a href="/atelier">🌬️ Vent & Précipitations</a>
      </div>
    </div>
  </body>
</html>
